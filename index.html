<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTZ Express</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f8f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#fff;
    width:90%;
    max-width:420px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
    text-align:center;
}

h1{
    color:#00875A;
    font-size:42px;
    margin-bottom:10px;
}

p{
    color:#555;
    font-size:18px;
}

button{
    margin-top:30px;
    background:#00875A;
    color:#fff;
    border:none;
    padding:16px 35px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#006F49;
}
</style>

</head>
